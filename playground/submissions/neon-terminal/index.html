<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Terminal</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: #030407;
      color: #e8fff5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,255,138,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,138,.08) 1px, transparent 1px),
        radial-gradient(circle at 65% 35%, rgba(0,212,255,.22), transparent 34%);
      background-size: 42px 42px, 42px 42px, auto;
      animation: drift 12s linear infinite;
    }
    @keyframes drift { to { transform: translateY(42px); } }
    main {
      position: relative;
      width: min(860px, calc(100vw - 36px));
      min-height: 430px;
      border: 1px solid rgba(0,255,138,.45);
      background: rgba(3, 8, 8, .82);
      box-shadow: 0 0 60px rgba(0,255,138,.15), inset 0 0 40px rgba(0,255,138,.06);
      padding: clamp(24px, 5vw, 56px);
    }
    .bar {
      display: flex;
      justify-content: space-between;
      color: rgba(232,255,245,.62);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 54px;
    }
    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(42px, 9vw, 92px);
      line-height: .92;
      letter-spacing: -.08em;
      color: #00ff8a;
      text-shadow: 0 0 22px rgba(0,255,138,.42);
    }
    p {
      width: min(540px, 100%);
      color: rgba(232,255,245,.72);
      line-height: 1.8;
      font-size: 15px;
    }
    .cursor { animation: blink .8s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <main>
    <div class="bar"><span>AIGC-X</span><span>PLAYGROUND / 002</span></div>
    <h1>Design is an executable signal<span class="cursor">_</span></h1>
    <p>Every participant can ship a tiny world: one HTML file, one visual language, one public preview.</p>
  </main>
</body>
</html>
